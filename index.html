<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Admin Panel - Al-Gazzali Madrasah</title>
    <style>
        body {
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border: 2px solid #660000;
            border-radius: 10px;
        }
        h1 {
            color: #660000;
            border-bottom: 3px solid #DAA520;
            padding-bottom: 10px;
        }
        .login-box {
            text-align: center;
            padding: 30px;
        }
        .login-box input {
            padding: 10px;
            width: 250px;
            border: 1px solid #999;
            font-size: 16px;
        }
        .login-box button {
            background: #660000;
            color: #fff;
            border: none;
            padding: 10px 30px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-box button:hover {
            background: #880000;
        }
        .login-error {
            color: red;
            margin-top: 10px;
        }
        .admin-panel {
            display: none;
        }
        .admin-panel.show {
            display: block;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 3px;
            color: #333;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group textarea {
            height: 60px;
        }
        .btn {
            background: #660000;
            color: #fff;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            margin-right: 5px;
        }
        .btn:hover {
            background: #880000;
        }
        .btn-logout {
            background: #555;
        }
        .btn-logout:hover {
            background: #333;
        }
        .status {
            padding: 8px;
            margin-top: 8px;
            border-radius: 4px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin: 15px 0;
        }
        .tabs button {
            padding: 8px 20px;
            background: #ddd;
            border: 1px solid #999;
            cursor: pointer;
            font-weight: bold;
        }
        .tabs button.active {
            background: #660000;
            color: #fff;
        }
        .tab-content {
            display: none;
            padding: 15px 0;
        }
        .tab-content.active {
            display: block;
        }
        .notice-preview {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 15px;
            border-radius: 4px;
        }
        .notice-preview h4 {
            color: #660000;
            margin: 0 0 10px 0;
        }
        .notice-item-preview {
            border-bottom: 1px dashed #ccc;
            padding: 5px 0;
        }
        .notice-item-preview:last-child {
            border-bottom: none;
        }
        .badge-preview {
            font-weight: bold;
            color: #660000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>⚙️ Admin Panel</h1>
        <span style="font-size:14px;color:#666;">Al-Gazzali Islamia Kamil Madrasah</span>
    </div>

    <!-- ===== লগইন বক্স ===== -->
    <div id="loginBox" class="login-box">
        <h3 style="color:#660000;">🔐 Admin Login Required</h3>
        <p style="color:#666;font-size:14px;">Enter password to manage notices, teachers & results</p>
        <br>
        <input type="password" id="adminPass" placeholder="Enter password" onkeypress="if(event.key==='Enter') adminLogin()">
        <br><br>
        <button onclick="adminLogin()">Login</button>
        <div id="loginError" class="login-error"></div>
    </div>

    <!-- ===== অ্যাডমিন প্যানেল ===== -->
    <div id="adminPanel" class="admin-panel">
        
        <div class="header-bar">
            <span style="font-size:14px;color:#006600;">✅ Logged in</span>
            <button class="btn btn-logout" onclick="adminLogout()">Logout</button>
        </div>

        <!-- ট্যাব -->
        <div class="tabs">
            <button class="active" onclick="switchTab('noticeTab')">📢 Notice</button>
            <button onclick="switchTab('teacherTab')">👨‍🏫 Teacher</button>
            <button onclick="switchTab('resultTab')">📊 Result</button>
            <button onclick="switchTab('previewTab')">👀 Preview</button>
        </div>

        <!-- নোটিশ -->
        <div id="noticeTab" class="tab-content active">
            <h3>📢 Add New Notice</h3>
            <div class="form-group">
                <label>Notice Type</label>
                <select id="nType">
                    <option value="URGENT">🔴 URGENT</option>
                    <option value="ADMISSION">📋 ADMISSION</option>
                    <option value="EVENT">🎪 EVENT</option>
                    <option value="ROUTINE">📅 ROUTINE</option>
                    <option value="GENERAL">📌 GENERAL</option>
                </select>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="nTitle" placeholder="Write notice title...">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="nDesc" placeholder="Write notice details..."></textarea>
            </div>
            <button class="btn" onclick="submitNotice()">📤 Publish Notice</button>
            <div id="noticeStatus" class="status"></div>
        </div>

        <!-- টিচার -->
        <div id="teacherTab" class="tab-content">
            <h3>👨‍🏫 Add New Teacher</h3>
            <div class="form-group">
                <label>Teacher Name</label>
                <input type="text" id="tName" placeholder="Full name">
            </div>
            <div class="form-group">
                <label>Education</label>
                <input type="text" id="tEdu" placeholder="Education qualification">
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" id="tDesig" placeholder="Designation">
            </div>
            <div class="form-group">
                <label>Details</label>
                <textarea id="tDetails" placeholder="Experience, achievements..."></textarea>
            </div>
            <button class="btn" onclick="submitTeacher()">👨‍🏫 Add Teacher</button>
            <div id="teacherStatus" class="status"></div>
        </div>

        <!-- রেজাল্ট -->
        <div id="resultTab" class="tab-content">
            <h3>📊 Add Student Result</h3>
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="rID" placeholder="Student ID">
            </div>
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="rName" placeholder="Full name">
            </div>
            <div class="form-group">
                <label>Class</label>
                <input type="text" id="rClass" placeholder="Class">
            </div>
            <div class="form-group">
                <label>GPA</label>
                <input type="text" id="rGPA" placeholder="GPA (e.g., 4.50)">
            </div>
            <button class="btn" onclick="submitResult()">📊 Add Result</button>
            <div id="resultStatus" class="status"></div>
        </div>

        <!-- প্রিভিউ -->
        <div id="previewTab" class="tab-content">
            <h3>👀 Live Preview</h3>
            <div class="notice-preview">
                <h4>📢 Latest Notices</h4>
                <div id="previewNotices">Loading...</div>
            </div>
            <br>
            <div class="notice-preview">
                <h4>👨‍🏫 Teachers</h4>
                <div id="previewTeachers">Loading...</div>
            </div>
        </div>

    </div>
</div>

<script>
    // ============================================================
    // কনফিগারেশন
    // ============================================================
    const scriptUrl = "https://script.google.com/macros/s/আপনার_URL/exec";
    const ADMIN_PASSWORD = "admin123";

    // ============================================================
    // লগইন
    // ============================================================
    function adminLogin() {
        var pass = document.getElementById('adminPass').value;
        var error = document.getElementById('loginError');
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').classList.add('show');
            error.textContent = '';
            document.getElementById('adminPass').value = '';
            loadPreview();
        } else {
            error.textContent = '❌ Wrong password! Try again.';
        }
    }

    function adminLogout() {
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('adminPanel').classList.remove('show');
        document.getElementById('adminPass').value = '';
    }

    document.getElementById('adminPass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') adminLogin();
    });

    // ============================================================
    // ট্যাব
    // ============================================================
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector('.tabs button[onclick*="' + tabId + '"]').classList.add('active');
        if (tabId === 'previewTab') loadPreview();
    }

    // ============================================================
    // নোটিশ
    // ============================================================
    function submitNotice() {
        var title = document.getElementById('nTitle').value.trim();
        var desc = document.getElementById('nDesc').value.trim();
        var type = document.getElementById('nType').value;
        var status = document.getElementById('noticeStatus');

        if (!title || !desc) {
            status.className = 'status error';
            status.textContent = '⚠️ Please fill both fields.';
            return;
        }

        status.className = 'status info';
        status.textContent = '⏳ Publishing...';

        var fd = new URLSearchParams();
        fd.append('action', 'addNotice');
        fd.append('title', title);
        fd.append('description', desc);
        fd.append('type', type);

        fetch(scriptUrl, { method: 'POST', body: fd, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    status.className = 'status success';
                    status.textContent = '✅ Published successfully!';
                    document.getElementById('nTitle').value = '';
                    document.getElementById('nDesc').value = '';
                    loadPreview();
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ Error: ' + data.error;
                }
            })
            .catch(() => {
                status.className = 'status error';
                status.textContent = '❌ Network error.';
            });
    }

    // ============================================================
    // টিচার
    // ============================================================
    function submitTeacher() {
        var name = document.getElementById('tName').value.trim();
        var edu = document.getElementById('tEdu').value.trim();
        var desig = document.getElementById('tDesig').value.trim();
        var details = document.getElementById('tDetails').value.trim();
        var status = document.getElementById('teacherStatus');

        if (!name || !desig) {
            status.className = 'status error';
            status.textContent = '⚠️ Name and Designation required.';
            return;
        }

        status.className = 'status info';
        status.textContent = '⏳ Adding...';

        var fd = new URLSearchParams();
        fd.append('action', 'addTeacher');
        fd.append('name', name);
        fd.append('education', edu);
        fd.append('designation', desig);
        fd.append('details', details);

        fetch(scriptUrl, { method: 'POST', body: fd, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    status.className = 'status success';
                    status.textContent = '✅ Teacher added!';
                    document.getElementById('tName').value = '';
                    document.getElementById('tEdu').value = '';
                    document.getElementById('tDesig').value = '';
                    document.getElementById('tDetails').value = '';
                    loadPreview();
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ Error: ' + data.error;
                }
            })
            .catch(() => {
                status.className = 'status error';
                status.textContent = '❌ Network error.';
            });
    }

    // ============================================================
    // রেজাল্ট
    // ============================================================
    function submitResult() {
        var id = document.getElementById('rID').value.trim();
        var name = document.getElementById('rName').value.trim();
        var cls = document.getElementById('rClass').value.trim();
        var gpa = document.getElementById('rGPA').value.trim();
        var status = document.getElementById('resultStatus');

        if (!id || !name || !cls || !gpa) {
            status.className = 'status error';
            status.textContent = '⚠️ All fields required.';
            return;
        }

        status.className = 'status info';
        status.textContent = '⏳ Adding...';

        var fd = new URLSearchParams();
        fd.append('action', 'addResult');
        fd.append('studentId', id);
        fd.append('name', name);
        fd.append('class', cls);
        fd.append('gpa', gpa);

        fetch(scriptUrl, { method: 'POST', body: fd, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    status.className = 'status success';
                    status.textContent = '✅ Result added!';
                    document.getElementById('rID').value = '';
                    document.getElementById('rName').value = '';
                    document.getElementById('rClass').value = '';
                    document.getElementById('rGPA').value = '';
                    loadPreview();
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ Error: ' + data.error;
                }
            })
            .catch(() => {
                status.className = 'status error';
                status.textContent = '❌ Network error.';
            });
    }

    // ============================================================
    // প্রিভিউ
    // ============================================================
    function loadPreview() {
        // নোটিশ প্রিভিউ
        fetch(scriptUrl + "?action=getNotices")
            .then(res => res.json())
            .then(data => {
                var html = '';
                if (data.length === 0) {
                    html = '<div style="color:#999;padding:10px;">📭 No notices available.</div>';
                } else {
                    data.slice(0, 5).forEach(n => {
                        html += '<div class="notice-item-preview">';
                        html += '<span class="badge-preview">[' + (n.Type || 'NOTICE') + ']</span> ';
                        html += '<b>' + n.Title + '</b><br>';
                        html += '<span style="font-size:13px;color:#555;">' + n.Description + '</span>';
                        if (n.Date) html += ' <span style="font-size:11px;color:#999;">📅 ' + n.Date + '</span>';
                        html += '</div>';
                    });
                }
                document.getElementById('previewNotices').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('previewNotices').innerHTML = '<span style="color:red;">Error loading</span>';
            });

        // টিচার প্রিভিউ
        fetch(scriptUrl + "?action=getTeachers")
            .then(res => res.json())
            .then(data => {
                var html = '';
                if (data.length === 0) {
                    html = '<div style="color:#999;padding:10px;">👨‍🏫 No teachers added yet.</div>';
                } else {
                    data.slice(0, 5).forEach(t => {
                        html += '<div class="notice-item-preview">';
                        html += '<b>' + t.Name + '</b> - ' + t.Designation;
                        if (t.Education) html += ' (' + t.Education + ')';
                        html += '</div>';
                    });
                }
                document.getElementById('previewTeachers').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('previewTeachers').innerHTML = '<span style="color:red;">Error loading</span>';
            });
    }
</script>

</body>
</html>
